name: CI

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/laytharfaoui/devops-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, frontend]

    steps:
      - name: Checkout devops-app
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  update-config:
    runs-on: ubuntu-latest
    needs: build-and-push        # runs only after both images are pushed

    steps:
      - name: Checkout devops-config
        uses: actions/checkout@v4
        with:
          repository: LaythArfaoui/devops-config
          token: ${{ secrets.GH_TOKEN }}
          path: devops-config

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz" | tar -xz
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in devops-config
        run: |
          cd devops-config/devops-config/overlays/dev
          kustomize edit set image \
            ghcr.io/laytharfaoui/devops-app/api:${{ github.sha }} \
            ghcr.io/laytharfaoui/devops-app/frontend:${{ github.sha }}

      - name: Commit and push to devops-config
        run: |
          cd devops-config
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "ci: bump api and frontend to ${{ github.sha }}"
          git push
